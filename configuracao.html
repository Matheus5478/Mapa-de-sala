<!doctype html>
<html lang="pt-br">
 
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Configurações - Sistema</title>
 
    <!-- TEMA GLOBAL -->
    <script>
        (function () {
            const tema = localStorage.getItem("tema") || "light";
            document.documentElement.setAttribute("data-bs-theme", tema);
        })();
    </script>
 
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
 
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
 
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
</head>
 
<body>
 
    <div id="app-header"></div>
 
    <main class="flex-grow-1">
        <div class="container-fluid">
            <div class="row g-0">
 
                <!-- MENU PADRÃO (IGUAL SALAS) -->
                <aside class="col-12 col-md-3 col-lg-2 app-sidebar">
                    <nav class="app-sidebar-nav">
                        <a class="app-side-link" href="dashboard.html">
                            <i class="bi bi-grid-3x3-gap"></i>
                            <span>Dashboard</span>
                        </a>
 
                        <a class="app-side-link" href="salas.html">
                            <i class="bi bi-door-closed"></i>
                            <span>Salas</span>
                        </a>
 
                        <a class="app-side-link" href="usuarios.html">
                            <i class="bi bi-people"></i>
                            <span>Usuários</span>
                        </a>
 
                        <a class="app-side-link" href="relatorios.html">
                            <i class="bi bi-clipboard-data"></i>
                            <span>Relatórios</span>
                        </a>
 
                        <a class="app-side-link active" href="config.html">
                            <i class="bi bi-gear"></i>
                            <span>Configurações</span>
                        </a>
                    </nav>
                </aside>
 
                <!-- CONTEÚDO -->
                <section class="col-12 col-md-9 col-lg-10 p-3 p-md-4 app-content">
 
                    <h4 class="mb-4">
                        <i class="bi bi-gear"></i> Configurações do Sistema
                    </h4>
 
                    <div class="row g-4">
 
                        <!-- TEMA -->
                        <div class="col-md-6">
                            <div class="app-card p-3 h-100">
                                <h5><i class="bi bi-moon-stars"></i> Tema</h5>
                                <p class="text-muted">Escolha entre claro ou escuro</p>
 
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="themeSwitch">
                                    <label class="form-check-label">Modo Escuro</label>
                                </div>
                            </div>
                        </div>
 
                        <!-- CONTA -->
                        <div class="col-md-6">
                            <div class="app-card p-3 h-100">
                                <h5><i class="bi bi-person"></i> Conta</h5>
 
                                <button class="app-btn app-btn-primary w-100 mb-2">
                                    <i class="bi bi-arrow-clockwise"></i> Relogar
                                </button>
 
                                <button class="btn btn-outline-danger w-100">
                                    <i class="bi bi-box-arrow-right"></i> Sair
                                </button>
                            </div>
                        </div>
 
                        <!-- NOTIFICAÇÕES -->
                        <div class="col-md-6">
                            <div class="app-card p-3 h-100">
                                <h5><i class="bi bi-bell"></i> Notificações</h5>
 
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox">
                                    <label class="form-check-label">Salas ocupadas</label>
                                </div>
 
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox">
                                    <label class="form-check-label">Sala liberada</label>
                                </div>
                            </div>
                        </div>
 
                        <!-- PREFERÊNCIAS -->
                        <div class="col-md-6">
                            <div class="app-card p-3 h-100">
                                <h5><i class="bi bi-sliders"></i> Preferências</h5>
 
                                <label class="form-label">Idioma</label>
                                <select class="form-select mb-2">
                                    <option>Português</option>
                                    <option>Inglês</option>
                                </select>
 
                                <label class="form-label">Visualização</label>
                                <select class="form-select">
                                    <option>Grade</option>
                                    <option>Lista</option>
                                </select>
                            </div>
                        </div>
 
                    </div>
 
                </section>
            </div>
        </div>
    </main>
 
    <div id="app-footer"></div>
 
    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
 
    <!-- COMPONENTES -->
    <script>
        async function loadComponent(id, file) {
            const el = document.getElementById(id);
            const res = await fetch(file);
            el.innerHTML = await res.text();
        }
 
        loadComponent("app-header", "components/header.html");
        loadComponent("app-footer", "components/footer.html");
    </script>
 
    <!-- SCRIPT TEMA -->
    <script>
        const themeSwitch = document.getElementById("themeSwitch");
 
        const temaAtual = localStorage.getItem("tema") || "light";
 
        if (temaAtual === "dark") {
            themeSwitch.checked = true;
        }
 
        themeSwitch.addEventListener("change", () => {
            const novoTema = themeSwitch.checked ? "dark" : "light";
 
            document.documentElement.setAttribute("data-bs-theme", novoTema);
            localStorage.setItem("tema", novoTema);
        });
    </script>
 
</body>
 
</html>
