<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Sistema de Controle de Salas</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- CSS do projeto (style.css) -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <!-- Header -->
    <div id="app-header"></div>

    <!-- Corpo -->
    <main
      class="flex-grow-1 d-flex align-items-center justify-content-center px-3 py-4"
    >
      <div class="col-12 col-sm-10 col-md-7 col-lg-4">
        <div class="app-card p-4">
          <!-- Título -->
          <div class="text-center mb-4">
            <div class="app-icon-badge mx-auto mb-2">
              <i class="bi bi-door-open"></i>
            </div>
            <h4 class="mb-1">Login</h4>
            <div class="small text-muted">
              Entre com suas credenciais para acessar
            </div>
          </div>

          <!-- Erro padrão -->
          <div id="loginError" class="alert alert-danger d-none" role="alert">
            <i class="bi bi-exclamation-triangle"></i>
            E-mail ou senha inválidos.
          </div>

          <form id="loginForm" novalidate>
            <!-- Email -->
            <div class="mb-3">
              <label for="email" class="form-label">E-mail</label>
              <div class="input-group">
                <span class="input-group-text app-input-icon">
                  <i class="bi bi-envelope-fill"></i>
                </span>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  placeholder="seuemail@exemplo.com"
                  required
                />
                <div class="invalid-feedback">Informe um e-mail válido.</div>
              </div>
            </div>

            <!-- Senha -->
            <div class="mb-3">
              <label for="password" class="form-label">Senha</label>
              <div class="input-group">
                <span class="input-group-text app-input-icon">
                  <i class="bi bi-lock-fill"></i>
                </span>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  placeholder="Digite sua senha"
                  minlength="4"
                  required
                />
                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  id="btnTogglePass"
                  aria-label="Mostrar/ocultar senha"
                >
                  <i class="bi bi-eye"></i>
                </button>
                <div class="invalid-feedback">
                  Informe sua senha (mín. 4 caracteres).
                </div>
              </div>
            </div>

            <!-- Lembrar-me / Esqueci -->
            <div class="d-flex align-items-center justify-content-between mb-3">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="rememberMe"
                />
                <label class="form-check-label" for="rememberMe"
                  >Lembrar-me</label
                >
              </div>

              <a href="#" class="small text-decoration-none"
                >Esqueci minha senha</a
              >
            </div>

            <!-- Botão -->
            <div class="d-grid mb-3">
              <button type="submit" class="btn app-btn-primary">
                <i class="bi bi-box-arrow-in-right"></i> Entrar
              </button>
            </div>

            <!-- Cadastro -->
            <div class="text-center">
              <span class="small text-muted">Não possui conta?</span>
              <a
                href="cadastro.html"
                class="small fw-semibold text-decoration-none"
              >
                <i class="bi bi-person-plus"></i> Cadastre-se
              </a>
            </div>
          </form>
        </div>

        <div class="text-center mt-3 small text-muted">
          Dica: usuário teste <span class="fw-semibold">admin@senac.com</span> /
          senha <span class="fw-semibold">1234</span>
        </div>
      </div>
    </main>

    <!-- Footer (componente padrão) -->
    <div id="app-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // ====== Carregar componente Footer ======
      async function loadComponent(id, file) {
        const el = document.getElementById(id);
        const res = await fetch(file);
        el.innerHTML = await res.text();
      }
      loadComponent("app-footer", "components/footer.html");

      // ====== Mostrar/Ocultar senha ======
      const btnTogglePass = document.getElementById("btnTogglePass");
      const passwordInput = document.getElementById("password");
      btnTogglePass.addEventListener("click", () => {
        const isPass = passwordInput.type === "password";
        passwordInput.type = isPass ? "text" : "password";
        btnTogglePass.innerHTML = isPass
          ? '<i class="bi bi-eye-slash"></i>'
          : '<i class="bi bi-eye"></i>';
      });

      // ====== Carregar componente Header ======
      async function loadComponent(id, file) {
        const el = document.getElementById(id);
        const res = await fetch(file);
        el.innerHTML = await res.text();
      }
      loadComponent("app-header", "components/header.html");
      // Logout padrão
      document.addEventListener("click", function (e) {
        if (e.target.closest("#btnLogout")) {
          localStorage.removeItem("auth");
          window.location.href = "login.html";
        }
      });

      // ====== Validação + Login (mock) ======
      const form = document.getElementById("loginForm");
      form.addEventListener("submit", (event) => {
        event.preventDefault();

        // validação bootstrap
        if (!form.checkValidity()) {
          form.classList.add("was-validated");
          return;
        }

        const email = document.getElementById("email").value.trim();
        const senha = document.getElementById("password").value;

        // Mock de login
        if (email === "admin@senac.com" && senha === "1234") {
          localStorage.setItem("auth", "true");
          window.location.href = "dashboard.html";
        } else {
          document.getElementById("loginError").classList.remove("d-none");
        }
      });
    </script>
  </body>
</html>
