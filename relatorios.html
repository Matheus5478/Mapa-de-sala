<!doctype html>
<html lang="pt-br">
 
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard - Sistema de Controle de Salas</title>
 
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
 
  <!-- CSS do projeto -->
  <link rel="stylesheet" href="assets/css/style.css" />

   <script>
        (function () {
            const tema = localStorage.getItem("tema") || "light";
            document.documentElement.setAttribute("data-bs-theme", tema);
        })();
    </script>
</head>
 
<body>
  <!-- Header (componente) -->
  <div id="app-header"></div>
 
  <main class="flex-grow-1">
    <div class="container-fluid">
      <div class="row g-0">
        <!-- MENU LATERAL (SIDEBAR) -->
        <aside class="col-12 col-md-3 col-lg-2 app-sidebar">
          <nav class="app-sidebar-nav">
            <a class="app-side-link " href="dashboard.html">
              <i class="bi bi-grid-3x3-gap"></i>
              <span>Dashboard</span>
            </a>
 
            <a class="app-side-link" href="salas.html">
              <i class="bi bi-door-closed"></i>
              <span>Salas</span>
            </a>
 
            <a class="app-side-link" href="usuarios.html">
              <i class="bi bi-people"></i>
              <span>Usuários</span>
            </a>
 
            <a class="app-side-link active" href="relatorios.html">
              <i class="bi bi-clipboard-data"></i>
              <span>Relatórios</span>
            </a>
 
            <a class="app-side-link" href="configuracao.html">
              <i class="bi bi-gear"></i>
              <span>Configurações</span>
            </a>
          </nav>
        </aside>
 
        <!-- CONTEÚDO -->
        <section class="col-12 col-md-9 col-lg-10 p-3 p-md-4 app-content">
 
          <!-- TOPO -->
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
              <h4 class="mb-0">Relatórios</h4>
              <div class="small text-muted">Consulta por período</div>
            </div>
 
            <button class="btn btn-sm app-btn-primary" id="btnExportar">
              <i class="bi bi-download"></i> Exportar
            </button>
          </div>
 
          <!-- FILTROS (PADRÃO DASHBOARD) -->
          <div class="app-card p-3 mb-3">
 
            <div class="row g-3">
 
              <div class="col-md-3">
                <label class="small">Dia</label>
                <select id="fRelDia" class="form-select form-select-sm app-date-select"></select>
              </div>
 
              <div class="col-md-3">
                <label class="small">Mês</label>
                <select id="fRelMes" class="form-select form-select-sm app-date-select"></select>
              </div>
 
              <div class="col-md-3">
                <label class="small">Ano</label>
                <select id="fRelAno" class="form-select form-select-sm app-date-select"></select>
              </div>
 
              <div class="col-md-3">
                <label class="small">Período</label>
                <select id="fRelPeriodo" class="form-select form-select-sm">
                  <option value="">Todos</option>
                  <option value="Manhã">Manhã</option>
                  <option value="Tarde">Tarde</option>
                  <option value="Noite">Noite</option>
                </select>
              </div>
 
            </div>
 
            <div class="mt-3 d-flex gap-2">
              <button class="btn btn-sm app-btn-primary" id="btnFiltrarRel">
                <i class="bi bi-funnel"></i> Filtrar
              </button>
 
              <button class="btn btn-sm btn-outline-secondary" id="btnLimparRel">
                <i class="bi bi-eraser"></i> Limpar
              </button>
            </div>
 
          </div>
 
          <!-- RESULTADO -->
          <div class="app-card p-3">
 
            <div class="fw-bold mb-2">Relatório por período</div>
 
            <div id="relResumo" class="small text-muted mb-3"></div>
 
            <div class="table-responsive">
              <table class="table align-middle mb-0">
                <thead class="small text-muted">
                  <tr>
                    <th>Turma</th>
                    <th>Tipo de sala</th>
                    <th>Nº Sala</th>
                  </tr>
                </thead>
 
                <tbody id="tbodyRelatorio"></tbody>
              </table>
            </div>
 
          </div>
 
        </section>
      </div>
    </div>
  </main>
 
  <!-- Footer (componente) -->
  <div id="app-footer"></div>
 
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
 
 
 
 
  <script>
    // ==============================
    // DADOS MOCK (PADRÃO SISTEMA)
    // ==============================
    const relDados = [
      { data: "2026-03-05", periodo: "Manhã", hora: "08:00", turma: "Turma A", tipo: "Lab", sala: "01" },
      { data: "2026-03-05", periodo: "Manhã", hora: "10:00", turma: "Turma B", tipo: "Comum", sala: "02" },
      { data: "2026-03-05", periodo: "Tarde", hora: "14:00", turma: "Turma C", tipo: "Lab", sala: "03" }
    ];
 
    // ==============================
    // POPULAR FILTROS
    // ==============================
    function initFiltros() {
      const dia = document.getElementById("fRelDia");
      const mes = document.getElementById("fRelMes");
      const ano = document.getElementById("fRelAno");
 
      for (let i = 1; i <= 31; i++) {
        dia.innerHTML += `<option>${i}</option>`;
      }
 
      for (let i = 1; i <= 12; i++) {
        mes.innerHTML += `<option>${i}</option>`;
      }
 
      for (let i = 2024; i <= 2027; i++) {
        ano.innerHTML += `<option>${i}</option>`;
      }
    }
 
    // ==============================
    // RENDER
    // ==============================
    function renderRelatorios(filtro = {}) {
      const tbody = document.getElementById("tbodyRelatorio");
      const resumo = document.getElementById("relResumo");
 
      tbody.innerHTML = "";
 
      let dadosFiltrados = relDados.filter(item => {
        if (filtro.periodo && item.periodo !== filtro.periodo) return false;
        return true;
      });
 
      if (dadosFiltrados.length === 0) {
        resumo.textContent = "Nenhum resultado encontrado.";
        return;
      }
 
      const ref = dadosFiltrados[0];
 
      resumo.innerHTML = `
    Data: <strong>${ref.data}</strong> •
    Período: <strong>${ref.periodo}</strong> •
    Hora: <strong>${ref.hora}</strong>
  `;
 
      dadosFiltrados.forEach(item => {
        tbody.innerHTML += `
      <tr>
        <td>${item.turma}</td>
        <td>${item.tipo}</td>
        <td>${item.sala}</td>
      </tr>
    `;
      });
    }
 
    // ==============================
    // EVENTOS
    // ==============================
    document.getElementById("btnFiltrarRel").addEventListener("click", () => {
      const periodo = document.getElementById("fRelPeriodo").value;
 
      renderRelatorios({ periodo });
    });
 
    document.getElementById("btnLimparRel").addEventListener("click", () => {
      document.getElementById("fRelPeriodo").value = "";
      renderRelatorios();
    });
 
    // ==============================
    // INIT
    // ==============================
    initFiltros();
    renderRelatorios();
  </script>
 
 

 
 
  <!-- SCRIPT PRINCIPAL -->
  <script>
    // Função para carregar componentes
    function loadComponent(id, url) {
      return fetch(url)
        .then(response => {
          if (!response.ok) {
            throw new Error("Erro ao carregar: " + url);
          }
          return response.text();
        })
        .then(data => {
          document.getElementById(id).innerHTML = data;
        })
        .catch(error => {
          console.error(error);
          document.getElementById(id).innerHTML = "<p style='color:red;'>Erro ao carregar componente</p>";
        });
    }
 
    // Carregar Header
    loadComponent("app-header", "components/header.html")
      .then(() => {
        const pageTitle = document.getElementById("pageTitle");
        if (pageTitle) pageTitle.textContent = "relatorios";
 
        const userName = document.getElementById("userName");
        if (userName) userName.textContent = "Admin";
      });
 
    // Carregar Footer
    loadComponent("app-footer", "components/footer.html");
  </script>
 
 
 
 
 
</body>
 
</html>
